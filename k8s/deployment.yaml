# k8s/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: judge
  labels:
    app: judge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: judge
  template:
    metadata:
      labels:
        app: judge
    spec:
      containers:
        - name: judge
          image: 10.0.0.10:5000/judge:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: judge-secrets
          volumeMounts:
            - name: chromadb-storage
              mountPath: /app/chroma_db
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: chromadb-storage
          hostPath:
            path: /data/judge/chroma_db
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: judge
spec:
  type: NodePort
  selector:
    app: judge
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30091