apiVersion: apps/v1
kind: Deployment
metadata:
  name: judge
  labels:
    app: judge
spec:
  replicas: 2
  selector:
    matchLabels:
      app: judge
  template:
    metadata:
      labels:
        app: judge
    spec:
      containers:
        - name: judge
          image: 10.0.0.10:5000/judge:latest
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: judge
spec:
  type: NodePort
  selector:
    app: judge
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30091